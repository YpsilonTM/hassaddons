name: OCPP SIGEN to MQTT
slug: ocppsigen2mqtt
description: OCPP 1.6 central system bridge – accepts charge point connections and exposes start/stop/status via MQTT for Home Assistant
version: 1.0.1
image: ghcr.io/ypsilontm/hassaddons/addon-ocppsigen2mqtt
url: https://github.com/YpsilonTM/hassaddons
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
map:
  - data:rw
ports:
  9000/tcp: 9000
ports_description:
  9000/tcp: OCPP WebSocket server
options:
  ocpp_host: "0.0.0.0"
  ocpp_port: 9000
  charger_id: "120A64150210"
  rfid_tag: "HomeAssistant"
  usable_phases: 2
  mqtt_host: core-mosquitto
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_client_id: ocppsigen2mqtt-addon
  topic_prefix: ocpp
  log_level: INFO
schema:
  ocpp_host: str
  ocpp_port: int
  charger_id: str
  rfid_tag: str
  usable_phases: list(1|2|3)
  mqtt_host: str
  mqtt_port: int
  mqtt_username: str
  mqtt_password: password
  mqtt_client_id: str
  topic_prefix: str
  log_level: list(DEBUG|INFO|WARNING|ERROR)
