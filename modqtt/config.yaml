name: ModQTT
slug: modqtt
description: General-purpose Modbus TCP to MQTT bridge
version: 0.2.1
image: ghcr.io/ypsilontm/hassaddons/addon-modqtt
legacy: true
url: https://github.com/YpsilonTM/hassaddons
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
map:
  - config:rw
options:
  allow_writes: false
  modbus_host: 192.168.50.11
  modbus_port: 502
  modbus_unit_id: 1
  modbus_timeout_seconds: 3.0
  poll_interval_seconds: 5.0
  mqtt_host: core-mosquitto
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_client_id: modqtt-addon
  topic_prefix: prod/device
  availability_topic: bridge/availability
  retain_state: true
  json_grouped_topics: false
  discovery_enabled: false
  discovery_device_name: Generic Device
  discovery_device_manufacturer: Generic
  discovery_device_model: ModQTT Bridge
  readings: []
  write_parameters: []
schema:
  allow_writes: bool
  modbus_host: str
  modbus_port: int(1,65535)
  modbus_unit_id: int(0,255)
  modbus_timeout_seconds: float(0,120)
  poll_interval_seconds: float(0,3600)
  mqtt_host: str
  mqtt_port: int(1,65535)
  mqtt_username: str?
  mqtt_password: password?
  mqtt_client_id: str
  topic_prefix: str
  availability_topic: str
  retain_state: bool
  json_grouped_topics: bool
  discovery_enabled: bool
  discovery_device_name: str
  discovery_device_manufacturer: str
  discovery_device_model: str
  readings:
    - name: str
      topic_suffix: str
      register_type: list(input|holding)
      address: int(0,65535)
      length_words: int(1,2)
      data_type: list(u16|s16|u32|s32|f32)
      scale: float
      offset: float
      decimals: int(0,6)
      byte_order: list(big|little)
      word_order: list(big|little)
      unit: str?
      device_class: str?
      state_class: str?
      entityCategory: list(config|diagnostic)?
      label: str?
      icon: str?
      writable: bool?
  write_parameters:
    - name: str
      register_type: list(holding)?
      address: int(0,65535)
      length_words: int(1,2)
      data_type: list(u16|s16|u32|s32)
      scale: float
      offset: float
      decimals: int(0,6)
      byte_order: list(big|little)
      word_order: list(big|little)
      entityCategory: list(config|diagnostic)?
      label: str?
      icon: str?
      min_value: float?
      max_value: float?
