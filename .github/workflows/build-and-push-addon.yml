name: Build and Push Add-on Image

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      push:
        description: Push image to GHCR
        required: false
        type: boolean
        default: true
  push:
    branches:
      - main
      - master
    tags:
      - v*
    paths:
      - modqtt/**
      - .github/workflows/build-and-push-addon.yml
  pull_request:
    paths:
      - modqtt/**
      - .github/workflows/build-and-push-addon.yml

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read add-on version
        id: addon
        shell: bash
        run: |
          echo "version=$(python - <<'PY'
          from pathlib import Path
          import yaml

          config = yaml.safe_load(Path('modqtt/config.yaml').read_text(encoding='utf-8'))
          print(config['version'])
          PY
          )" >> "$GITHUB_OUTPUT"

      - name: Set image name
        id: image
        shell: bash
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}/addon-modqtt" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ steps.addon.outputs.version }},enable=${{ github.event_name != 'pull_request' }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: ./modqtt
          file: ./modqtt/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.push) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
